<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Mitosis Quiz</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h1>Mitosis Quiz</h1>

<div class="progress-container">
  <div id="progress-bar"></div>
</div>

<div id="static-instruction">
  Drag the prompts/images into stage of mitosis they belong to below.
</div>

<div class="question-area">
  <div id="draggable" class="answer" draggable="true">
    <div id="prompt"></div>
  </div>
</div>

<div id="categories" class="categories"></div>

<div id="prompt"></div>

<div class="score">
  Correct: <span id="score">0</span> / <span id="total">0</span>
</div>

<div id="feedback"></div>
<button id="continue-btn" style="display:none;">Continue</button>

<!-- Final screen -->
<div id="final-screen" style="display:none;">
  <h2>Quiz Completed!</h2>
  <p id="final-score"></p>
  <button id="retry-btn">Retry Quiz</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
