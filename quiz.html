<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title id="quizTitle">Quiz</title>

    <link id="favicon" rel="icon" type="image/svg+xml" />

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <div class="container">
      <h1 id="quizHeader">Quiz</h1>

      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>

      <div id="static-instruction">
        Drag the prompt into the correct category.
      </div>

      <div class="question-area">
        <div id="draggable" class="answer" draggable="true">
          <div id="prompt"></div>
        </div>
      </div>

      <div id="categories" class="categories"></div>

      <div class="score">
        Correct:
        <span id="score">0</span>
        /
        <span id="total">0</span>
      </div>

      <div id="feedback"></div>

      <button id="continue-btn" class="btn btn-small" style="display: none">
        Continue
      </button>

      <div id="final-screen" style="display: none">
        <h2>Quiz Completed</h2>

        <p id="final-score"></p>

        <button id="retry-btn" class="btn btn-small">Retry Quiz</button>

        <br /><br />
      </div>

      <footer>
        <a id="mainBack">
          <button class="btn btn-small">Back</button>
        </a>
      </footer>
    </div>

    <script src="js/quiz.js"></script>
  </body>
</html>
