<!DOCTYPE html>

<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-T3NE3G0PNN"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-T3NE3G0PNN");
    </script>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title id="tabTitle">Quiz</title>

    <link id="favicon" rel="icon" type="image/svg+xml" />

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <div class="container">
      <div id="loading-screen">
        <div class="science-loader">
          <div class="loader-ring"></div>

          <div class="science-emoji">🧪</div>
        </div>

        <p class="loading-text">Preparing quiz...</p>
      </div>
      <h1 id="quizHeader">Quiz</h1>

      <!-- progress -->

      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>

      <div class="instruction-container">
        <div id="instruction-text"></div>
      </div>

      <!-- QUESTION AREA -->

      <div class="question-area">
        <!-- PROMPT -->

        <div id="prompt-container">
          <div id="prompt"></div>
        </div>

        <!-- INTERACTION (drag tile lives here) -->

        <div id="interaction-area">
          <div id="draggable" class="answer" draggable="false"></div>
        </div>
      </div>

      <!-- ANSWERS AREA -->

      <div id="categories" class="categories"></div>

      <!-- FEEDBACK -->

      <div id="feedback"></div>

      <div class="score">
        Score:
        <span id="score">0</span>
        /
        <span id="total">0</span>
      </div>

      <button id="continue-btn" class="btn btn-small" style="display: none">
        Continue
      </button>

      <button id="skip-btn" class="btn btn-small" style="display: none">
        Skip
      </button>

      <!-- FINAL SCREEN -->

      <div id="final-screen" style="display: none">
        <h2>Quiz Complete!</h2>

        <p id="final-score"></p>

        <button id="retry-btn" class="btn">Retry</button>
      </div>

      <footer>
        <a id="mainBack">
          <button class="btn btn-small">Back</button>
        </a>
        <p>STEM Study Buddy</p>
      </footer>
    </div>

    <script src="js/quiz.js" defer></script>
  </body>
</html>
